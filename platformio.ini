; ============================================================================
; ClawdPet - Claude Code CLI 状态电子宠物
; 目标硬件: M5Stack "StickS3"  (SoC: ESP32-S3-PICO-1-N8R8)
;   = ESP32-S3 + 8MB Flash(QIO) + 8MB PSRAM(OPI/Octal)
;
; board 说明:
;   使用通用 esp32-s3-devkitc-1 并手动对齐 flash/PSRAM 参数,
;   M5Unified 会在运行时自动识别真实板型(屏幕/IMU/电源)。
;   若确认是 Cardputer, 可把 board 改为 m5stack-cardputer。
; ============================================================================

[platformio]
default_envs = stick_s3

[env:stick_s3]
platform  = espressif32@^6.7.0
board     = esp32-s3-devkitc-1
framework = arduino

; --- SoC / Flash / PSRAM (PICO-1-N8R8) ---
board_build.mcu                 = esp32s3
board_build.f_cpu               = 240000000L
board_build.flash_size          = 8MB
board_build.flash_mode          = qio
board_build.psram_type          = opi
board_upload.flash_size         = 8MB
board_build.arduino.memory_type = qio_opi
board_build.partitions          = default_8MB.csv

; --- USB: 让默认 Serial 走板载 USB-CDC (USB Serial 通信) ---
build_flags =
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DCORE_DEBUG_LEVEL=3

; --- 串口监视 / 烧录 ---
monitor_speed   = 115200
monitor_filters = esp32_exception_decoder, time
upload_speed    = 921600

; --- 嵌入 GIF 动画 (设备端用 AnimatedGIF 实时解码) ---
board_build.embed_files =
    src/anim/choosing.gif
    src/anim/error.gif
    src/anim/coffee.gif
    src/anim/reading.gif
    src/anim/watering.gif
    src/anim/coding.gif
    src/anim/painting.gif
    src/anim/guitar.gif
    src/anim/photo.gif
    src/anim/eating.gif
    src/anim/dragon-boat.gif
    src/anim/exercise.gif
    src/anim/nap.gif
    src/anim/hammer.gif
    src/anim/cheer.gif
    src/anim/poked.gif

; --- 依赖库 ---
lib_deps =
    m5stack/M5Unified@^0.2.2
    bitbank2/AnimatedGIF@^2.2.0
